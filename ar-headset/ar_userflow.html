<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>INTELLIDEN — AR User Flow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Space Grotesk',sans-serif;
  background:#f7f7f5;
  background-image:radial-gradient(circle,#d8d8d5 1px,transparent 1px);
  background-size:24px 24px;
  min-height:100vh;
  padding:52px 48px 64px;
}
header{text-align:center;margin-bottom:48px}
.brand{font-size:10px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:#aaa}
h1{font-size:22px;font-weight:700;color:#1a1a1a;margin-top:4px}
.wrap{background:white;border-radius:20px;box-shadow:0 4px 32px rgba(0,0,0,0.08);padding:40px 40px 32px;max-width:1040px;margin:0 auto}
.wrap svg{width:100%;display:block}
.legend{display:flex;align-items:center;gap:24px;justify-content:center;margin-top:28px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#888}
.leg-dot{width:28px;height:16px;border-radius:8px}
.leg-screen{background:white;border:1.5px solid #1a1a1a}
.leg-action{background:#e8fcff;border:1.5px solid #00c0d0}
.leg-alert{background:#fff4f0;border:1.5px solid #ff5533}
.leg-opt{background:white;border:1.5px dashed #bbb}
.leg-end{background:#1a1a1a}
footer{text-align:center;margin-top:40px;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#ccc}
</style>
</head>
<body>

<header>
  <div class="brand">INTELLIDEN · AR Headset</div>
  <h1>User Flow</h1>
</header>

<div class="wrap">
<svg viewBox="0 0 960 340" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- drop shadow for nodes -->
  <filter id="sh" x="-10%" y="-20%" width="120%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.08)"/>
  </filter>
  <!-- arrowhead default gray -->
  <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#bbb"/>
  </marker>
  <!-- arrowhead cyan -->
  <marker id="ac" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#00c0d0"/>
  </marker>
  <!-- arrowhead orange -->
  <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#ff5533"/>
  </marker>
</defs>

<!-- ─── ARROWS (drawn first, behind nodes) ─── -->

<!-- START → HUB -->
<path d="M 136,170 H 172" stroke="#bbb" stroke-width="1.5" marker-end="url(#a)"/>

<!-- HUB → ROOMS (fan up) -->
<path d="M 290,160 C 328,160 328,80 358,80" stroke="#bbb" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
<text x="302" y="112" font-family="Space Grotesk" font-size="9" fill="#bbb" text-anchor="middle" transform="rotate(-32,302,112)">Rooms tab</text>

<!-- HUB → ACCESS (straight) -->
<path d="M 290,170 H 358" stroke="#bbb" stroke-width="1.5" marker-end="url(#a)"/>
<text x="324" y="162" font-family="Space Grotesk" font-size="9" fill="#bbb" text-anchor="middle">Access tab</text>

<!-- HUB → GESTURE (fan down) -->
<path d="M 290,182 C 328,182 328,290 358,290" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#a)"/>
<text x="302" y="248" font-family="Space Grotesk" font-size="9" fill="#ccc" text-anchor="middle" transform="rotate(32,302,248)">open palm</text>

<!-- ROOMS → TOGGLE -->
<path d="M 468,80 H 530" stroke="#00c0d0" stroke-width="1.5" marker-end="url(#ac)"/>
<text x="499" y="70" font-family="Space Grotesk" font-size="9" fill="#00b0c0" text-anchor="middle">select room</text>

<!-- ACCESS → VIEW ALERT -->
<path d="M 468,162 C 500,162 500,160 530,158" stroke="#ff5533" stroke-width="1.5" fill="none" marker-end="url(#ao)"/>
<text x="499" y="152" font-family="Space Grotesk" font-size="9" fill="#ff6644" text-anchor="middle">gaze alert</text>

<!-- ACCESS → VIEW USER -->
<path d="M 468,178 C 500,178 500,224 530,228" stroke="#bbb" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
<text x="499" y="218" font-family="Space Grotesk" font-size="9" fill="#bbb" text-anchor="middle">gaze user</text>

<!-- GESTURE → QUICK ACTION -->
<path d="M 484,290 H 530" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
<text x="507" y="282" font-family="Space Grotesk" font-size="9" fill="#ccc" text-anchor="middle">pinch</text>

<!-- TOGGLE → DONE (arc down) -->
<path d="M 646,80 C 706,80 706,168 728,170" stroke="#00c0d0" stroke-width="1.5" fill="none" marker-end="url(#ac)"/>

<!-- V_ALERT → DONE -->
<path d="M 646,158 C 700,158 706,168 728,170" stroke="#ff5533" stroke-width="1.5" fill="none" marker-end="url(#ao)"/>

<!-- V_USER → DONE -->
<path d="M 646,232 C 706,232 706,175 728,172" stroke="#bbb" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

<!-- QUICK → DONE (arc up) -->
<path d="M 646,290 C 706,290 706,180 728,176" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#a)"/>

<!-- ─── NODES ─── -->

<!-- START -->
<ellipse cx="78" cy="170" rx="58" ry="24" fill="#1a1a1a" filter="url(#sh)"/>
<text x="78" y="175" font-family="Space Grotesk" font-size="11" fill="white" text-anchor="middle" font-weight="700">Power On</text>

<!-- HUB (main node, slightly larger) -->
<rect x="172" y="142" width="118" height="56" rx="10" fill="white" stroke="#1a1a1a" stroke-width="2" filter="url(#sh)"/>
<text x="231" y="166" font-family="Space Grotesk" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="700">HUB</text>
<text x="231" y="182" font-family="Space Grotesk" font-size="8.5" fill="#aaa" text-anchor="middle">Overview screen</text>

<!-- ROOMS -->
<rect x="358" y="56" width="110" height="48" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.5" filter="url(#sh)"/>
<text x="413" y="77" font-family="Space Grotesk" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="600">ROOMS</text>
<text x="413" y="93" font-family="Space Grotesk" font-size="8" fill="#aaa" text-anchor="middle">6 room tiles</text>

<!-- ACCESS -->
<rect x="358" y="144" width="110" height="52" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.5" filter="url(#sh)"/>
<text x="413" y="166" font-family="Space Grotesk" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="600">ACCESS</text>
<text x="413" y="182" font-family="Space Grotesk" font-size="8" fill="#aaa" text-anchor="middle">Users + Alerts</text>

<!-- GESTURE OVERLAY (dashed, lighter) -->
<rect x="358" y="266" width="126" height="48" rx="8" fill="white" stroke="#bbb" stroke-width="1.2" stroke-dasharray="6,3"/>
<text x="421" y="287" font-family="Space Grotesk" font-size="10.5" fill="#999" text-anchor="middle" font-weight="600">GESTURE</text>
<text x="421" y="303" font-family="Space Grotesk" font-size="8" fill="#ccc" text-anchor="middle">Overlay menu</text>

<!-- TOGGLE ROOM (cyan action) -->
<rect x="530" y="56" width="116" height="48" rx="8" fill="#e8fcff" stroke="#00c0d0" stroke-width="1.5" filter="url(#sh)"/>
<text x="588" y="77" font-family="Space Grotesk" font-size="10.5" fill="#007890" text-anchor="middle" font-weight="600">Toggle Room</text>
<text x="588" y="93" font-family="Space Grotesk" font-size="8" fill="#00a0b0" text-anchor="middle">pinch to switch</text>

<!-- VIEW ALERT (orange action) -->
<rect x="530" y="132" width="116" height="48" rx="8" fill="#fff4f0" stroke="#ff5533" stroke-width="1.5" filter="url(#sh)"/>
<text x="588" y="153" font-family="Space Grotesk" font-size="10.5" fill="#cc3311" text-anchor="middle" font-weight="600">View Alert</text>
<text x="588" y="169" font-family="Space Grotesk" font-size="8" fill="#ff6644" text-anchor="middle">review · dismiss</text>

<!-- VIEW USER (subtle) -->
<rect x="530" y="208" width="116" height="48" rx="8" fill="white" stroke="#ccc" stroke-width="1.2"/>
<text x="588" y="229" font-family="Space Grotesk" font-size="10.5" fill="#888" text-anchor="middle" font-weight="600">View User</text>
<text x="588" y="245" font-family="Space Grotesk" font-size="8" fill="#bbb" text-anchor="middle">permissions</text>

<!-- QUICK ACTION (dashed, subtle) -->
<rect x="530" y="266" width="116" height="48" rx="8" fill="white" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5,3"/>
<text x="588" y="287" font-family="Space Grotesk" font-size="10.5" fill="#999" text-anchor="middle" font-weight="600">Quick Action</text>
<text x="588" y="303" font-family="Space Grotesk" font-size="8" fill="#ccc" text-anchor="middle">lights · climate · lock</text>

<!-- DONE (dark pill) -->
<ellipse cx="796" cy="172" rx="72" ry="28" fill="#1a1a1a" filter="url(#sh)"/>
<text x="796" y="168" font-family="Space Grotesk" font-size="12" fill="white" text-anchor="middle" font-weight="700">✓  Done</text>
<text x="796" y="184" font-family="JetBrains Mono" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">confirmed</text>

</svg>

<!-- LEGEND -->
<div class="legend">
  <div class="leg-item"><div class="leg-dot leg-screen"></div>Screen</div>
  <div class="leg-item"><div class="leg-dot leg-action"></div>Action (gaze + pinch)</div>
  <div class="leg-item"><div class="leg-dot leg-alert"></div>Alert interaction</div>
  <div class="leg-item"><div class="leg-dot leg-opt"></div>Optional / overlay</div>
  <div class="leg-item"><div class="leg-dot leg-end"></div>Terminal state</div>
</div>
</div>

<footer>INTELLIDEN · AR Headset · User Flow</footer>
</body>
</html>
